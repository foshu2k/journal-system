{% extends 'entries/base.html' %}
{% load static %}

{% block content %}

<form class="mb-1 border border-1" method="POST">
    <div>
        {% csrf_token %}
        
        {{ form.non_field_errors }}            

        <div class="title">
            {{ form.title.label_tag }}
            <br>
            {{ form.title }}
        </div>

        <div class="content">
            {{ form.content.label_tag }}
            <br>
            {{ form.content }}
        </div>
    </div>

    <section class="voice-panel" aria-label="Voice recorder">
        <div class="waveform" role="img" aria-label="Audio waveform"></div>
        <div class="voice-controls">
        <button type="button" class="voice-btn" aria-label="Rewind">«</button>
        <button type="button" id="micBtn" class="voice-btn record" aria-label="Start recording">●</button>
        <button type="submit" class="voice-btn" aria-label="Stop">■</button>
        </div>
    </section>
</form>

{% endblock %}

{% block javascript %}
    <script src="{% static 'entries/js/script.js' %}"></script>
{% endblock %}
