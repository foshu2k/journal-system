<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        {% load static %}
        <link rel="stylesheet" href="{% static 'entries/css/style.css' %}">
    </head>

    <body> 
        {% block content %}

        <form class="mb-1 border border-1" method="POST">
            <div>
                {% csrf_token %}
                
                {{ form.non_field_errors }}            

                <div class="title">
                    {{ form.title.label_tag }}
                    <br>
                    {{ form.title }}
                </div>

                <div class="content">
                    {{ form.content.label_tag }}
                    <br>
                    {{ form.content }}
                </div>
            </div>

            <section class="voice-panel" aria-label="Voice recorder">
                <div class="waveform" role="img" aria-label="Audio waveform"></div>
                <div class="voice-controls">
                    <button type="button" class="voice-btn" aria-label="Rewind">«</button>
                    <button type="button" id="micBtn" class="voice-btn record" aria-label="Start recording">
                        <img src="/static/entries/assets/mic.png" alt="Microphone Icon">
                    <button type="submit" class="voice-btn" aria-label="Stop">■</button>
                </div>
            </section>
        </form>

        {% endblock %}

        {% block javascript %}
            <script src="{% static 'entries/js/script.js' %}"></script>
        {% endblock %}
    </body>
</html>
