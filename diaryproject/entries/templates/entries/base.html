<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Diary Web App</title>

        {% load static %}
        <link rel="stylesheet" href="{% static 'entries/css/style.css' %}">
    </head>

    <body>
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
        <nav class="bottom-nav" aria-label="Primary">
            <a href="{% url 'home' %}" class="nav-item active">
                <span class="icon">⌂</span><span>Home</span>
            </a>
            
            <a href="{% url 'create_entry' %}" class="nav-fab" aria-label="New diary entry">+</a>

            <a href="{% url 'entry_list' %}" class="nav-item">
                <span class="icon">☰</span><span>Entries</span>
            </a>
            
        </nav>
        {% block javascript %}
        {% endblock %}
    </body>
</html>
